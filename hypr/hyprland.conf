monitor=,preferred,auto,1

$terminal = kitty

exec-once = waybar -c ~/.config/waybar/config.jsonc -s ~/.config/waybar/style.css
exec-once = awww-daemon

#DECLARATIONS
$mainKey = SUPER

#app_keybinds
bind = $mainKey, C, exec, $terminal						# open_terminal
bind = $mainKey, M, exit  							# quit_hyprland
bind = $mainKey, B, exec, ~/.config/hypr/settings/browser.sh		# Open the browser in declarated to the sh file.
bind = $mainKey, E, exec, ~/.config/hypr/settings/filemanager.sh		# Open the file manager in declarated to the sh file.

#Wallpaper_change
bind = $mainKey, W, exec, ~/.config/hypr/hyprlab-scripts/change-wallpaper-lab.sh

#Workspaces_switch
bind = $mainKey, 1, workspace, 1
bind = $mainKey, 2, workspace, 2 
bind = $mainKey, 3, workspace, 3
bind = $mainKey, 4, workspace, 4
bind = $mainKey, 5, workspace, 5

#Move active window other workspace
bind = $mainKey SHIFT, 1, movetoworkspace, 1
bind = $mainKey SHIFT, 2, movetoworkspace, 2
bind = $mainKey SHIFT, 3, movetoworkspace, 3
bind = $mainKey SHIFT, 4, movetoworkspace, 4
bind = $mainKey SHIFT, 5, movetoworkspace, 5

#app_launcher
bind = $mainKey, SPACE, exec, rofi -show drun					#Open app launcher

#window
bind = $mainKey, Q, killactive							# Kill active window

input {
    kb_layout = hu
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(b026ffcc)
    col.inactive_border = rgba(22222255)
}

decoration {
    rounding = 5
    active_opacity = 0.90 		#aktiv_ablak
    inactive_opacity = 0.80		#inaktiv_ablak
    fullscreen_opacity = 1.0		#teljes_kepernyos

    blur {
    	enabled = true
	size = 10
	passes = 3
	new_optimizations = true
	xray = false
	ignore_opacity = false
	}
}

animations {
    enabled = yes
}
